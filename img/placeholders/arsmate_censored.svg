<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blurFilter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Dibujo censurado (con mucho blur) -->
  <g filter="url(#blurFilter)">
    <path d="M 100 120 C 150 100, 200 100, 250 120 L 220 350 L 80 350 Z" fill="#a855f7" opacity="0.7"/>
    <circle cx="150" cy="80" r="40" fill="#fbcfe8" opacity="0.7"/>
  </g>

  <!-- Logo de Arsmate encima (sin blur) -->
  <rect x="230" y="20" width="50" height="50" rx="10" fill="#a855f7"/>
  <text x="238" y="55" font-family="Arial" font-size="40" fill="white" font-weight="bold">A</text>
  
  <!-- Pixelado manual estilo Paint -->
  <rect x="100" y="180" width="40" height="40" fill="#d8b4fe"/>
  <rect x="140" y="180" width="40" height="40" fill="#9333ea"/>
  <rect x="120" y="220" width="40" height="40" fill="#7e22ce"/>
  <rect x="160" y="220" width="40" height="40" fill="#a855f7"/>
  
  <text x="40" y="380" font-family="Comic Sans MS" font-size="18" fill="purple">Contenido +18 Aqui</text>
</svg>
