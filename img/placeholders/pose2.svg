  <path d="M 300 50 Q 320 30 340 50 Q 360 70 320 110 Q 280 70 300 50" fill="red"/>
  <path d="M 350 150 Q 360 140 370 150 Q 380 160 360 180 Q 340 160 350 150" fill="pink"/>
