<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blurFilter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Dibujo censurado (con blur) -->
  <g filter="url(#blurFilter)">
    <!-- Cuerpo abstracto posando -->
    <path d="M 120 100 L 180 100 L 220 300 L 80 300 Z" fill="purple" opacity="0.6"/>
    <circle cx="150" cy="70" r="30" fill="pink" opacity="0.6"/>
    <path d="M 100 150 L 50 250 M 200 150 L 250 250" stroke="black" stroke-width="10" opacity="0.4"/>
  </g>

  <!-- Logo de Telegram encima (sin blur) -->
  <circle cx="250" cy="50" r="30" fill="#229ED9"/>
  <path d="M 235 50 L 260 35 L 255 65 L 248 55 L 235 50" fill="white"/>
  
  <!-- Rectángulo de censura estilo Paint -->
  <rect x="50" y="150" width="200" height="50" fill="black" opacity="0.8"/>
  <text x="75" y="185" font-family="Comic Sans MS" font-size="20" fill="white">CENSURADO</text>
  
  <text x="30" y="380" font-family="Comic Sans MS" font-size="18" fill="blue">Solo para fans VIP!</text>
</svg>
