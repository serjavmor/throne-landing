<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Cuerpo del iPhone -->
  <rect x="80" y="50" width="140" height="280" rx="25" ry="25" fill="#1a1a1a" stroke="black" stroke-width="4"/>
  <!-- Pantalla -->
  <rect x="90" y="65" width="120" height="250" rx="15" ry="15" fill="#a855f7" opacity="0.3"/>
  <!-- Isla dinámica / Notch -->
  <rect x="125" y="75" width="50" height="10" rx="5" fill="black"/>
  <!-- Cámaras traseras (estilo Paint) -->
  <rect x="85" y="55" width="50" height="50" rx="10" fill="#333" opacity="0.8"/>
  <circle cx="100" cy="70" r="8" fill="black"/>
  <circle cx="120" cy="70" r="8" fill="black"/>
  <circle cx="110" cy="90" r="8" fill="black"/>
  <!-- Brillos -->
  <path d="M 100 80 L 190 280" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Texto -->
  <text x="60" y="370" font-family="Comic Sans MS" font-size="20" fill="black">Para mejores tiktoks!</text>
  <text x="130" y="200" font-family="Arial" font-size="40" fill="white" opacity="0.5"></text>
</svg>
