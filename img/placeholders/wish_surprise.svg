<svg width="300" height="400" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>
  <!-- Caja de regalo -->
  <rect x="70" y="150" width="160" height="150" fill="#a855f7" stroke="black" stroke-width="5"/>
  <rect x="60" y="130" width="180" height="40" fill="#7c3aed" stroke="black" stroke-width="5"/>
  <!-- Lazo -->
  <path d="M 150 130 L 150 300 M 70 225 L 230 225" stroke="gold" stroke-width="10"/>
  <circle cx="150" cy="130" r="15" fill="gold"/>
  <path d="M 150 130 Q 120 80 150 80 Q 180 80 150 130" fill="gold" stroke="black"/>
  <path d="M 150 130 Q 120 180 150 180 Q 180 180 150 130" fill="gold" stroke="black" opacity="0.5"/>
  <!-- Signo de interrogación -->
  <text x="135" y="240" font-family="Comic Sans MS" font-size="60" fill="white" font-weight="bold">?</text>
  <text x="50" y="380" font-family="Comic Sans MS" font-size="22" fill="purple">Sorpresa!</text>
</svg>
