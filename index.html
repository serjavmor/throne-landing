<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blue.rreiik | Official Portfolio & Gifts</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="smart-header">
        <div class="header-content">
            <div class="smart-logo">
                <i class="fas fa-magic"></i> Smart<span>Bio</span>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main class="smart-main">
        <section class="top-accent">
            <div class="accent-glow"></div>
            <svg class="curve-divider" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#ffffff" fill-opacity="1" d="M0,160L80,176C160,192,320,224,480,213.3C640,203,800,149,960,128C1120,107,1280,117,1360,122.7L1440,128L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z"></path>
            </svg>
        </section>

        <section class="bio-content">
            <div class="profile-overlap">
                <img src="img/placeholders/pose1.svg" alt="Profile" class="circular-profile">
            </div>

            <div class="text-info">
                <h1>Blue.rreiik</h1>
                <p>Modelo profesional y creadora de contenido. Especializada en arte visual, moda y experiencias inmersivas.</p>
            </div>

            <div class="social-circles">
                <a href="#" class="circle-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="circle-icon"><i class="fab fa-instagram"></i></a>
                <a href="#" class="circle-icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="circle-icon"><i class="fab fa-youtube"></i></a>
            </div>

            <div class="links-pills">
                <a href="#" class="pill-btn main-pill">
                    <span class="pill-icon"><i class="fas fa-globe"></i></span>
                    <span class="pill-text">Visita mi sitio web</span>
                    <span class="pill-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
                </a>
                
                <a href="#" class="pill-btn secondary-pill">
                    <span class="pill-icon"><i class="fas fa-folder"></i></span>
                    <span class="pill-text">Ver portafolio completo</span>
                    <span class="pill-arrow"><i class="fas fa-chevron-right"></i></span>
                </a>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 CREATORNAME. Todos los derechos reservados.</p>
        <p class="disclaimer">Los regalos son voluntarios y no reembolsables. Gracias por tu apoyo.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
